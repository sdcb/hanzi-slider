<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汉字抽抽乐</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 祥云装饰背景 -->
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
    
    <!-- 印章装饰 -->
    <div class="seal-decoration">
        <div class="seal-content">汉字<br>抽乐</div>
    </div>

    <!-- GitHub 角标 -->
    <a href="https://github.com/sdcb/hanzi-slider" class="github-corner" target="_blank" rel="noopener noreferrer" aria-label="View source on GitHub">
        <svg width="80" height="80" viewBox="0 0 250 250" aria-hidden="true">
            <path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"></path>
            <path d="M128.3,109.0 C113.8,99.7 119.0,89.6 119.0,89.6 C122.0,82.7 120.5,78.6 120.5,78.6 C119.2,72.0 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2" fill="currentColor" style="transform-origin: 130px 106px;" class="octo-arm"></path>
            <path d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88.0 127.5,74.4 143.8,58.0 C148.5,53.4 154.0,51.2 159.7,51.0 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 187.2,61.8 190.9,65.4 C194.5,69.0 197.7,73.2 200.1,77.6 C213.8,80.2 216.3,84.9 216.3,84.9 C212.7,93.1 206.9,96.0 205.4,96.6 C205.1,102.4 203.0,107.8 198.3,112.5 C181.9,128.9 168.3,122.5 157.7,114.1 C157.9,116.9 156.7,120.9 152.7,124.9 L141.0,136.5 C139.8,137.7 141.6,141.9 141.8,141.8 Z" fill="currentColor" class="octo-body"></path>
        </svg>
    </a>

    <div id="app">
        <!-- 标题装饰框 -->
        <div class="title-container">
            <div class="title-decoration left"></div>
            <h1>汉字抽抽乐</h1>
            <div class="title-decoration right"></div>
        </div>
        
        <div class="controls">
            <select id="structure-select">
                <option value="">-- 请选择结构 --</option>
                <option value="LR">左右结构</option>
                <option value="UD">上下结构</option>
            </select>
            
            <select id="set-select" disabled>
                <option value="">-- 请先选择结构 --</option>
            </select>

            <button id="random-btn">🎲 随机选择</button>
        </div>

        <div id="game-container" class="game-container" style="display: none;">
            
            <!-- 抽抽乐视窗 -->
            <div id="viewport-frame" class="viewport-frame">
                <!-- 传统纹样角装饰 -->
                <div class="corner-decoration corner-tl"></div>
                <div class="corner-decoration corner-tr"></div>
                <div class="corner-decoration corner-bl"></div>
                <div class="corner-decoration corner-br"></div>
                <div class="mask-overlay"></div>
                <!-- 内容将通过JS注入 -->
            </div>

            <!-- 结果展示 -->
            <div class="result-area">
                <div class="result-title">组合结果</div>
                <div id="result-content" class="result-content">
                    <!-- 动态生成 -->
                    <span>请拖动滑块组成汉字</span>
                </div>
            </div>

        </div>
        
        <div id="welcome-msg">
            <p>请在上方选择一个偏旁开始游戏。</p>
        </div>
    </div>

    <!-- 引用数据文件 -->
    <script src="js/data.js"></script>
    <!-- 引用游戏逻辑 -->
    <script src="js/game.js"></script>
</body>
</html>
