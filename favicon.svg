  <!-- 内圈装饰 -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.6"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#d4af37" stroke-width="0.5" opacity="0.4"/>
  
